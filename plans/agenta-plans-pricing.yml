specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Agenta
providerId: agenta
created: '2026-06-20'
modified: '2026-06-20'
reconciled: true
tags:
- AI
- LLMOps
- Prompt Management
- LLM Evaluation
- Observability
- Plans
description: >-
  Agenta is open-source and MIT licensed; the full platform can be self-hosted
  for free. Agenta Cloud is offered as a managed SaaS with a free Hobby tier and
  paid Pro, Business, and Enterprise tiers. Cloud pricing is seat-based with
  included monthly trace and evaluation allowances, retention windows, and
  overage pricing on additional traces. Self-hosting carries no Agenta license
  fee - you pay only your own infrastructure and the LLM provider costs.
notes: >-
  Verify current tiers, seat counts, trace allowances, retention, and overage
  rates against the Agenta pricing page during reconciliation; SaaS pricing
  changes frequently.
sources:
- https://agenta.ai/pricing
- https://docs.agenta.ai/
- https://github.com/Agenta-AI/agenta
plans:
- id: agenta-open-source
  name: Open Source (Self-Hosted)
  type: free
  description: >-
    The complete Agenta platform under the MIT license, deployed on your own
    infrastructure via Docker Compose or Kubernetes. No Agenta license fee; you
    bear only hosting and LLM provider costs.
  entries:
  - label: Self-Hosted Platform
    name: self_hosted
    type: flat
    metric: license
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: $0 (MIT license, self-hosted infrastructure costs apply)
    userMultiplied: false
  elements:
  - name: Prompt Management
  - name: Prompt Playground
  - name: LLM Evaluation
  - name: LLM Observability
  - name: Testsets
- id: agenta-hobby
