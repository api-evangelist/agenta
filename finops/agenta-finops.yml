description: >-
  FinOps view of Agenta spend. Agenta Cloud bills a seat-based monthly
  subscription per tier (Hobby free, Pro $49, Business $399, Enterprise custom)
  with included monthly trace and evaluation allowances and a $5 per additional
  10k traces overage on paid plans. The MIT-licensed open-source platform can be
  self-hosted at no Agenta license cost, shifting spend entirely to your own
  infrastructure. Note that LLM provider token costs incurred while running
  prompts and evaluations are billed by those providers, not by Agenta.
notes: >-
  Per-tier prices, seat and trace allowances, and overage rates are subject to
  change; verify against the Agenta pricing page during reconciliation. LLM
  inference token spend is external to Agenta billing.
sources:
- https://agenta.ai/pricing
