meters:
- name: subscription
  description: Monthly base subscription per cloud tier (Pro $49, Business $399).
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: seats
  description: Workspace member seats; additional Pro seats at $20 each up to 10.
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - plan
- name: traces
  description: Observability traces ingested; included allowance per plan with $5 per additional 10k overage.
  unit: traces
  aggregation: sum
  dimensions:
  - account
  - plan
  - application
- name: evaluations
  description: Evaluation runs executed; metered against the plan allowance (unlimited on Pro and above).
  unit: evaluations
  aggregation: sum
  dimensions:
  - account
  - plan
- name: self_hosted_infrastructure
  description: Compute, database, and storage costs for MIT-licensed self-hosted deployments (no Agenta license fee).
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - environment
- name: external_llm_tokens
  description: LLM provider token spend incurred running prompts and evaluations; billed by the provider, not Agenta.
  unit: tokens
  aggregation: sum
  dimensions:
  - account
  - provider
  - model
principles:
- name: Visibility
  description: Use Agenta observability traces and analytics to attribute cost, latency, and token usage per application and variant.
- name: Allocation
  description: Tag traces and API keys per project/team and map cloud subscription and trace overages to internal cost centers.
- name: Optimization
  description: Right-size the cloud tier to actual trace volume, prune retention, and consider self-hosting under MIT when infrastructure is cheaper than SaaS overages; route evaluation work to lower-cost models.
- name: Accountability
  description: Assign owners per workspace and review monthly subscription, trace overage, and external LLM token spend against budget.
